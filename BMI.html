<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Toán Chỉ Số Cơ Thể & Thực Đơn</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --box-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: var(--box-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
            color: var(--primary-color);
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #004494;
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            background: #e9f5ff;
            border-left: 5px solid var(--primary-color);
            border-radius: 5px;
            display: none;
        }
        .highlight {
            font-weight: bold;
            color: #d9534f;
        }
        .macro-box {
            background: #fff;
            padding: 15px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hệ Thống Tính Toán Dinh Dưỡng</h1>
    
    <div class="grid-2">
        <div class="form-group">
            <label for="gender">Giới tính:</label>
            <select id="gender">
                <option value="male">Nam</option>
                <option value="female">Nữ</option>
            </select>
        </div>
        <div class="form-group">
            <label for="age">Tuổi:</label>
            <input type="number" id="age" value="42" min="1">
        </div>
        <div class="form-group">
            <label for="weight">Cân nặng (kg):</label>
            <input type="number" id="weight" value="80" step="0.1" min="1">
        </div>
        <div class="form-group">
            <label for="height">Chiều cao (cm):</label>
            <input type="number" id="height" value="165" step="0.1" min="1">
        </div>
    </div>

    <div class="form-group">
        <label for="activity">Mức độ vận động:</label>
        <select id="activity">
            <option value="1.2">Ít vận động (Làm việc văn phòng)</option>
            <option value="1.375">Vận động nhẹ (Thể dục 1-3 ngày/tuần)</option>
            <option value="1.55">Vận động vừa (Thể dục 3-5 ngày/tuần)</option>
            <option value="1.725">Vận động nhiều (Thể dục 6-7 ngày/tuần)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="goal">Mục tiêu:</label>
        <select id="goal">
            <option value="-500">Giảm mỡ (-500 calo)</option>
            <option value="0">Giữ dáng (Giữ nguyên calo)</option>
            <option value="500">Tăng cơ/Tăng cân (+500 calo)</option>
        </select>
    </div>

    <button onclick="calculateMetrics()">TÍNH TOÁN NGAY</button>

    <div id="result">
        <h2>Báo Cáo Chi Tiết</h2>
        <div id="bmi-result"></div>
        <div id="calorie-result"></div>
        <div id="macro-result"></div>
    </div>
</div>

<script>
    function calculateMetrics() {
        // Lấy dữ liệu từ form
        const gender = document.getElementById('gender').value;
        const age = parseFloat(document.getElementById('age').value);
        const weight = parseFloat(document.getElementById('weight').value);
        const height = parseFloat(document.getElementById('height').value);
        const activityMultiplier = parseFloat(document.getElementById('activity').value);
        const goalCalorie = parseFloat(document.getElementById('goal').value);

        if (!age || !weight || !height) {
            alert("Vui lòng điền đầy đủ thông tin!");
            return;
        }

        // 1. Tính BMI
        const heightM = height / 100;
        const bmi = weight / (heightM * heightM);
        let bmiStatus = "";
        if (bmi >= 25) {
            bmiStatus = "Thừa cân (Nên ưu tiên mục tiêu giảm mỡ)";
        } else if (bmi >= 18.5) {
            bmiStatus = "Cân nặng bình thường (Duy trì nề nếp hiện tại)";
        } else {
            bmiStatus = "Thiếu cân (Nên ưu tiên mục tiêu tăng cân)";
        }

        // 2. Tính BMR (Mifflin-St Jeor)
        let bmr = 0;
        if (gender === 'male') {
            bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
        } else {
            bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
        }

        // 3. Tính TDEE và Calo mục tiêu
        const tdee = bmr * activityMultiplier;
        const targetCalories = tdee + goalCalorie;

        // 4. Tính Macros (40% Carb, 30% Protein, 30% Fat)
        const carbCals = targetCalories * 0.40;
        const proteinCals = targetCalories * 0.30;
        const fatCals = targetCalories * 0.30;

        const carbsG = carbCals / 4;
        const proteinG = proteinCals / 4;
        const fatG = fatCals / 9;

        // 5. Hiển thị kết quả
        document.getElementById('result').style.display = 'block';
        
        document.getElementById('bmi-result').innerHTML = `
            <h3>1. Chỉ Số Khối Cơ Thể (BMI)</h3>
            <p>BMI của bạn: <span class="highlight">${bmi.toFixed(2)}</span></p>
            <p>Đánh giá: <strong>${bmiStatus}</strong></p>
        `;

        document.getElementById('calorie-result').innerHTML = `
            <h3>2. Năng Lượng Tiêu Hao & Mục Tiêu</h3>
            <ul>
                <li>Trao đổi chất cơ bản (BMR): <strong>${Math.round(bmr)} calo/ngày</strong></li>
                <li>Tổng tiêu hao (TDEE): <strong>${Math.round(tdee)} calo/ngày</strong></li>
                <li>Mức calo cần nạp mỗi ngày để đạt mục tiêu: <span class="highlight">${Math.round(targetCalories)} calo</span></li>
            </ul>
        `;

        document.getElementById('macro-result').innerHTML = `
            <h3>3. Tỷ Lệ Thực Đơn Chuẩn (40% Tinh bột - 30% Đạm - 30% Béo)</h3>
            <div class="macro-box">
                <p>🍚 <strong>Tinh bột (Carb): ${Math.round(carbsG)}g</strong> (${Math.round(carbCals)} calo)</p>
                <p><em>Gợi ý: Gạo lứt, yến mạch, khoai lang, bánh mì nguyên cám.</em></p>
            </div>
            <div class="macro-box">
                <p>🍗 <strong>Đạm (Protein): ${Math.round(proteinG)}g</strong> (${Math.round(proteinCals)} calo)</p>
                <p><em>Gợi ý: Ức gà, cá biển, thịt nạc, trứng, các loại đậu, hoặc kết hợp các sản phẩm sữa non bổ sung kháng thể cao cấp.</em></p>
            </div>
            <div class="macro-box">
                <p>🥑 <strong>Chất béo (Fat): ${Math.round(fatG)}g</strong> (${Math.round(fatCals)} calo)</p>
                <p><em>Gợi ý: Dầu olive, quả bơ, cá hồi, hạt hạnh nhân, óc chó.</em></p>
            </div>
        `;
    }
</script>

</body>
</html>
